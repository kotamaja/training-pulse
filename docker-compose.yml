services:

  mysql-dev:
    image: mariadb:10.11
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./docker/database/schema/schema-create.sql:/docker-entrypoint-initdb.d/schema-create.sql
      - training-pulse-mysql-dev:/var/lib/mysql

  php:
    build:
      context: .
      dockerfile: docker/dev/php/Dockerfile
      args:
        PHP_VERSION: "8.4"
    working_dir: /var/www
    volumes:
      - ./api:/var/www:delegated
      - ./.docker-cache/composer:/tmp/composer
    environment:

      COMPOSER_HOME: /tmp/composer
      COMPOSER_CACHE_DIR: /tmp/composer/cache
      XDEBUG_MODE: ${XDEBUG_MODE:-off}

      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql-dev:3306/${MYSQL_DATABASE}?serverVersion=${MYSQL_VERSION}

      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      STRAVA_REDIRECT_URI: ${STRAVA_REDIRECT_URI}
      STRAVA_ACTIVITY_SUMMARY_PER_PAGE: ${STRAVA_ACTIVITY_SUMMARY_PER_PAGE}

      JWT_SECRET_KEY: '%kernel.project_dir%/config/jwt/private.pem'
      JWT_PUBLIC_KEY: '%kernel.project_dir%/config/jwt/public.pem'
      JWT_PASSPHRASE: '${JWT_PASSPHRASE:?JWT_PASSPHRASE is required}'

    user: "${UID:-1000}:${GID:-1000}"

  node:
    build:
      context: .
      dockerfile: docker/dev/node/Dockerfile
      args:
        NODE_VERSION: 24-bookworm-slim
    working_dir: /app
    volumes:
      - ./training-pulse-frontend:/app
    ports:
      - "4200:4200"
    tty: true
    stdin_open: true
    command: bash


  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - php
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./api:/var/www
      - ./docker/dev/nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/dev/nginx/certs:/etc/nginx/certs:ro

volumes:
  training-pulse-mysql-dev: