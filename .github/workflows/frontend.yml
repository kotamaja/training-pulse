name: Frontend CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  frontend-build:
    name: Install and build Angular frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend-ng

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: training-pulse-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build