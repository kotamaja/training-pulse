security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        login:
            pattern: ^/api/v1/auth/login$
            stateless: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker

            json_login:
#                check_path: api_v1_auth_login
                check_path: /api/v1/auth/login
                username_path: email
                password_path: password
                success_handler: App\Security\JsonJwtLoginSuccessHandler
                failure_handler: App\Security\JsonLoginFailureHandler

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            entry_point: App\Security\JsonAuthenticationEntryPoint
            jwt: ~

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/api/v1/auth/login$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/refresh$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/logout$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
